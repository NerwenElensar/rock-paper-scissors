<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="main.js" defer></script>
    <title>Rock, Paper, Scissors</title>
  </head>
  <body>
    <h1>Rock, Paper, Scissors</h1>
    <button type="button" class="weapon">Rock</button>
    <button type="button" class="weapon">Paper</button>
    <button type="button" class="weapon">Scissors</button>
    <div class="score-board">
      <h2>Scoreboard</h2>
      <ul>
        <li>Points Player: <span class="player-points">0</span></li>
        <li>Points Computer: <span class="computer-points">0</span></li>
      </ul>
    </div>
    <button type="button" class="reset">Reset Game</button>
  </body>
</html>
